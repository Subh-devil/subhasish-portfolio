<svg xmlns="http://www.w3.org/2000/svg" width="360" height="480" viewBox="0 0 360 480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3a0000"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff1e1e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff1e1e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="180" cy="200" r="110"/>
    </clipPath>
  </defs>
  <rect width="360" height="480" fill="url(#bg)"/>
  <rect width="360" height="480" fill="url(#glow)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="120" x2="360" y2="120" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="240" x2="360" y2="240" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="360" x2="360" y2="360" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="480" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="480" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Avatar circle -->
  <circle cx="180" cy="200" r="115" fill="rgba(255,30,30,0.12)" stroke="rgba(255,30,30,0.4)" stroke-width="1.5"/>
  <circle cx="180" cy="200" r="110" fill="#1a0a0a"/>
  <!-- Silhouette body -->
  <ellipse cx="180" cy="185" rx="52" ry="58" fill="#2a1010"/>
  <!-- Head -->
  <circle cx="180" cy="155" r="38" fill="#2a1010"/>
  <!-- Shoulders -->
  <ellipse cx="180" cy="260" rx="75" ry="40" fill="#1e0808"/>
  <!-- Initials -->
  <text x="180" y="210" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="42" font-weight="800" letter-spacing="6" fill="rgba(255,255,255,0.9)">SS</text>
  <!-- Name tag at bottom -->
  <rect x="60" y="390" width="240" height="52" rx="10" fill="rgba(255,30,30,0.1)" stroke="rgba(255,30,30,0.3)" stroke-width="1"/>
  <text x="180" y="412" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#ffffff">SUBHASISH SAHOO</text>
  <text x="180" y="432" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" letter-spacing="2" fill="#8b8b8b">VIDEO EDITOR</text>
</svg>
